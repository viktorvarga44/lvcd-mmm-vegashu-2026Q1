<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LVCD — Marketing Mix Modelling 2026 Q1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFDD00; --dark: #22201C; --bg: #FBFAF9;
      --text: #161512; --muted: #6B6760; --border: #E8E7E3;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--yellow);
           min-height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center;
           -webkit-font-smoothing: antialiased; }
    .lock-box { background: var(--dark); padding: 3rem 2.5rem; width: 100%; max-width: 420px; }
    .lock-logo { font-size: .85rem; font-weight: 800; color: rgba(255,221,0,.5);
                  letter-spacing: -.01em; margin-bottom: 2.5rem; }
    .lock-title { font-size: 1.4rem; font-weight: 800; color: #fff;
                   line-height: 1.2; letter-spacing: -.02em; margin-bottom: .5rem; }
    .lock-sub { font-size: .82rem; color: rgba(255,255,255,.35); margin-bottom: 2rem; }
    .lock-label { font-size: .7rem; font-weight: 700; letter-spacing: .12em;
                   text-transform: uppercase; color: rgba(255,221,0,.6); margin-bottom: .5rem; display: block; }
    .lock-input { width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
                   color: #fff; font-family: var(--font); font-size: .95rem; font-weight: 600;
                   padding: .85rem 1rem; outline: none; transition: border .2s; }
    .lock-input:focus { border-color: var(--yellow); }
    .lock-input::placeholder { color: rgba(255,255,255,.2); }
    .lock-btn { width: 100%; margin-top: 1rem; background: var(--yellow); border: none;
                 font-family: var(--font); font-size: .85rem; font-weight: 800;
                 letter-spacing: .06em; text-transform: uppercase; color: var(--dark);
                 padding: .9rem 1rem; cursor: pointer; transition: opacity .15s; }
    .lock-btn:hover { opacity: .85; }
    .lock-btn:disabled { opacity: .4; cursor: not-allowed; }
    .lock-error { font-size: .78rem; color: #F87171; margin-top: .75rem;
                   display: none; font-weight: 600; }
    .lock-spinner { display: none; font-size: .78rem; color: rgba(255,255,255,.35);
                     margin-top: .75rem; }
    .lock-footer { margin-top: 2rem; font-size: .7rem; color: rgba(255,255,255,.2);
                    border-top: 1px solid rgba(255,255,255,.07); padding-top: 1.25rem; }
  </style>
</head>

    <div class="lock-title">Védett dokumentum</div>
    <p class="lock-sub">LVCD · Marketing Mix Modelling · 2026 Q1</p>
    <label class="lock-label" for="pwd">Jelszó</label>
    <input class="lock-input" type="password" id="pwd" placeholder="Írd be a jelszót…" autocomplete="current-password">
    <button class="lock-btn" id="btn" onclick="unlock()">Megnyitás</button>
    <div class="lock-error" id="err">Helytelen jelszó. Kérlek próbáld újra.</div>
    <div class="lock-spinner" id="spin">Visszafejtés folyamatban…</div>
    <div class="lock-footer">AES-256-CBC · PBKDF2-SHA256 · Csak belső használatra</div>
  </div>

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      return buf;
    }

    async function unlock() {
      const pwd = document.getElementById('pwd').value;
      if (!pwd) return;
      const btn  = document.getElementById('btn');
      const err  = document.getElementById('err');
      const spin = document.getElementById('spin');
      btn.disabled = true;
      err.style.display  = 'none';
      spin.style.display = 'block';

      try {
        const [saltB64, ivB64, ctB64] = PAYLOAD.split(':');
        const salt = b64ToBytes(saltB64);
        const iv   = b64ToBytes(ivB64);
        const ct   = b64ToBytes(ctB64);

        const keyMat = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          keyMat,
          { name: 'AES-CBC', length: 256 },
          false, ['decrypt']
        );
        const decBuf = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, ct);
        const html   = new TextDecoder().decode(decBuf);

        // Írjuk ki a visszafejtett HTML-t
        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        spin.style.display = 'none';
        err.style.display  = 'block';
        btn.disabled = false;
        document.getElementById('pwd').focus();
      }
    }
  </script>
